<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Jokia Agency | English Presentation</title>
  <meta
    name="description"
    content="Jokia Agency helps businesses grow with AI automations, high-converting landing pages, and fast delivery."
  />
  <style>
    :root {
      --bg: #0b1020;
      --card: rgba(255, 255, 255, 0.08);
      --text: #ffffff;
      --muted: rgba(255, 255, 255, 0.78);
      --accent: #7b5cff;
      --accent-2: #2563eb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(900px circle at 10% 0%, rgba(123, 92, 255, 0.35), transparent 50%),
        radial-gradient(900px circle at 90% 20%, rgba(37, 99, 235, 0.35), transparent 55%),
        linear-gradient(180deg, #0b1020 0%, #070707 100%);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(760px, 100%);
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: var(--card);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(2rem, 5vw, 2.8rem);
      line-height: 1.05;
      letter-spacing: -0.02em;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 1.02rem;
      line-height: 1.6;
    }

    .services {
      margin: 22px 0 28px;
      display: grid;
      gap: 10px;
    }

    .service {
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      padding: 12px 14px;
      background: rgba(255, 255, 255, 0.04);
      color: #fff;
      font-weight: 600;
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 0 18px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 700;
      border: 1px solid rgba(255, 255, 255, 0.2);
      transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn-primary {
      color: #fff;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
      box-shadow: 0 10px 28px rgba(123, 92, 255, 0.35);
    }

    .btn-secondary {
      color: #fff;
      background: rgba(255, 255, 255, 0.08);
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Jokia Agency</h1>
    <p>
      We help businesses save time and increase revenue through practical AI systems,
      high-converting pages, and fast execution.
    </p>

    <section class="services" aria-label="Services">
      <div class="service">AI Automations</div>
      <div class="service">Landing Pages</div>
      <div class="service">Fast Delivery</div>
    </section>

    <div class="buttons">
      <a class="btn btn-primary" href="https://jokia.agency" target="_blank" rel="noopener noreferrer">
        Visit Jokia.agency
      </a>
      <a class="btn btn-secondary" href="https://wa.me/5403547654477" target="_blank" rel="noopener noreferrer">
        WhatsApp
      </a>
    </div>
  </main>
</body>
</html>
